services:
  - type: web
    name: seller-block-marketplace-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CHAIN_CONFIG_JSON
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: SEPOLIA_RPC_URL_FALLBACK
        sync: false
      - key: MARKETPLACE_REGISTRY_ADDRESS
        sync: false
      - key: MARKETPLACE_SETTLEMENT_V2_ADDRESS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: START_BLOCK
        value: 0
      - key: INDEXER_ENABLED
        value: true
      - key: INDEXER_POLL_MS
        value: 5000
      - key: INDEXER_CHUNK_SIZE
        value: 2000
      - key: CACHE_TTL_MS
        value: 30000
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: LISTING_AUTOHIDE_REPORTS_THRESHOLD
        value: 3
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_WALLET_ADDRESSES
        sync: false
      - key: AUTH_TOKEN_TTL_SECONDS
        value: 28800
      - key: AUTH_NONCE_TTL_SECONDS
        value: 600
      - key: FRONTEND_APP_URL
        sync: false
      - key: NOTIFICATIONS_SCAN_MS
        value: 60000
      - key: NOTIFICATION_EMAIL_FROM
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PROMOTION_HOMEPAGE_PRICE_CENTS
        value: 4900
      - key: PROMOTION_HOMEPAGE_DURATION_DAYS
        value: 7
      - key: PROMOTION_HOMEPAGE_PRIORITY
        value: 180
      - key: PROMOTION_HOMEPAGE_PLACEMENT_SLOT
        value: homepage-paid-primary
      - key: PINATA_JWT
        sync: false
      - key: PINATA_GATEWAY_BASE_URL
        sync: false
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: AIRDROP_FUNDER_PRIVATE_KEY
        sync: false
      - key: LOG_LEVEL
        value: info